<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vedas - An AI Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", system-ui, sans-serif;
            background: linear-gradient(135deg, #81868b, #7c7c86);
            min-height: 100vh;
            color: #fff;
            display: flex;
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            animation: float 7s infinite ease-in-out;
            z-index: 0;
        }

        .c1 {
            width: 380px;
            height: 380px;
            background: #4a90e2;
            top: 8%;
            left: 12%;
        }

        .c2 {
            width: 450px;
            height: 450px;
            background: #9b59b6;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-35px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .layout {
            position: relative;
            z-index: 2;
            display: flex;
            width: 100%;
            padding: 25px;
            gap: 30px;
        }

        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(14px);
            padding: 20px;
            border-radius: 14px;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 8px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(16px);
            border-radius: 14px;
            padding: 20px;
            height: 92vh;
        }

        .chat-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            margin-bottom: 12px;
            max-width: 70%;
        }

        .user-msg {
            margin-left: auto;
            background: rgba(0, 149, 255, 0.42);
        }

        .bot-msg {
            background: rgba(255, 255, 255, 0.22);
        }

        .error-msg {
            background: rgba(255, 77, 77, 0.3);
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .send-btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            cursor: pointer;
        }

        .loading {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>

    <div class="layout">

        <div class="sidebar">
            <div class="box">
                <p><strong>🌐 Region:</strong> <span id="regionDisplay"></span></p>
                <p><strong>📡 Country:</strong> <span id="countryDisplay"></span></p>
                <p><strong>🛠 Site ID:</strong> <span id="siteDisplay"></span></p>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">💬 Vedas - An AI Assistant</div>

            <div class="chat-box" id="chatBox">
                <div class="msg bot-msg">
                    👋 Hello! I'm Vedas. How can I help you with network operations today?
                </div>
            </div>

            <div class="chat-input-area">
                <input id="chatInput" class="chat-input" placeholder="Type a message..."
                    onkeypress="handleKeyPress(event)" />
                <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>

    <script>
        /* ===== Persisted selections ===== */
        function getSavedSelections() {
            return {
                region: localStorage.getItem("selectedRegion") || "Not selected",
                country: localStorage.getItem("selectedCountry") || "Not selected",
                site: localStorage.getItem("selectedSite") || "Not selected",
                siteInfo: localStorage.getItem("selectedSiteInfo")
            };
        }

        function updateSidebarDisplay() {
            const s = getSavedSelections();
            document.getElementById("regionDisplay").textContent = s.region;
            document.getElementById("countryDisplay").textContent = s.country;
            document.getElementById("siteDisplay").textContent = s.site;
        }

        window.onload = updateSidebarDisplay;

        /* ===== Chat Logic ===== */
        let conversationHistory = [];

        async function sendMessage() {
            const input = document.getElementById("chatInput");
            const chatBox = document.getElementById("chatBox");
            const sendBtn = document.getElementById("sendBtn");

            const message = input.value.trim();
            if (!message) return;

            input.disabled = sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            chatBox.innerHTML += `<div class="msg user-msg">${escapeHtml(message)}</div>`;
            input.value = "";

            conversationHistory.push({ role: "user", content: message });

            const loading = document.createElement("div");
            loading.className = "msg bot-msg";
            loading.innerHTML = '<span class="loading"></span> Thinking...';
            chatBox.appendChild(loading);
            chatBox.scrollTop = chatBox.scrollHeight;

            const context = conversationHistory.slice(-5)
                .map(m => `${m.role}: ${m.content}`).join("\n");

            const s = getSavedSelections();

            // Safe parse siteInfo
            let parsedSiteInfo = null;
            try { parsedSiteInfo = s.siteInfo ? JSON.parse(s.siteInfo) : null; } catch (e) { }

            const payload = {
                message: message,
                region: s.region,
                country: s.country,
                site: s.site,
                siteInfo: parsedSiteInfo,
                context
            };

            try {
                const res = await fetch("http://161.145.120.131:8080/proxy", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Backend error ${res.status}`);

                // Robust parsing handling
                const rawText = await res.text();
                console.log("Raw backend response:", rawText);

                let data;
                try {
                    data = JSON.parse(rawText);
                    // Handle double-encoded JSON if applicable
                    if (typeof data === 'string') {
                        try { data = JSON.parse(data); } catch (e) { }
                    }
                } catch (e) {
                    // Fallback: treat raw text as the message if it's not JSON
                    data = { response: rawText };
                }

                loading.remove();

                // Extract reply from various likely fields
                const reply = data?.response || data?.answer || data?.message ||
                    data?.data?.response || data?.generated_text ||
                    (typeof data === 'string' ? data : "No response");

                chatBox.innerHTML += `<div class="msg bot-msg">${escapeHtml(reply)}</div>`;
                conversationHistory.push({ role: "assistant", content: reply });

                // Scroll to bottom
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (e) {
                loading.remove();
                chatBox.innerHTML += `<div class="msg error-msg">❌ ${escapeHtml(e.message || e)}</div>`;
            }

            input.disabled = sendBtn.disabled = false;
            sendBtn.textContent = "Send";
            input.focus();
        }

        // Simple XSS protection helper if not already present
        function escapeHtml(text) {
            if (typeof text !== 'string') return text;
            return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function handleKeyPress(e) {
            if (e.key === "Enter") sendMessage();
        }
    </script>

</body>

</html>
