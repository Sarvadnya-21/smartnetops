<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Smart NetOps Hub</title>
<script src="activity-tracker.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: "Poppins", system-ui, sans-serif;
    background: linear-gradient(135deg, #81868b, #7c7c86);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .bg-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.6;
    animation: float 8s infinite ease-in-out;
  }
  .c1 {
    width: clamp(180px, 30vw, 280px);
    height: clamp(180px, 30vw, 280px);
    left: 10vw;
    top: 10vh;
  }

  .c2 {
    width: clamp(200px, 35vw, 330px);
    height: clamp(200px, 35vw, 330px);
    right: 8vw;
    bottom: 8vh;
  }
  
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-30px); }
    100% { transform: translateY(0px); }
  }

  .login-container {
    width: clamp(280px, 80vw, 380px);
    padding: clamp(20px, 4vw, 40px);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(18px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    animation: fadeIn 1.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    margin: auto;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 38px;
    color: #fff;
    animation: pulse 2s infinite;
  }

    /* RESPONSIVE LOGO */
  .logo {
    width: clamp(60px, 12vw, 80px);
    height: clamp(60px, 12vw, 80px);
    font-size: clamp(28px, 6vw, 38px);
  }

  /* INPUT RESPONSIVE */
  input {
    padding: clamp(10px, 2.3vw, 14px);
    font-size: clamp(14px, 2.5vw, 15px);
  }

  /* BUTTON RESPONSIVE */
  .login-btn {
    padding: clamp(10px, 2.5vw, 14px);
    font-size: clamp(14px, 2.5vw, 16px);
  }

  /* BACKGROUND CIRCLES */
  .c1, .c2 {
    filter: blur(clamp(40px, 5vw, 70px));
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.07); opacity: 1; }
    100% { transform: scale(1); opacity: 0.9; }
  }

  h2 {
    color: #fff;
    font-size: 26px;
    margin-bottom: 25px;
    font-weight: 600;
  }

  .input-group {
    position: relative;
    margin-bottom: 28px;
    width: 100%;
  }

  input {
    width: 100%;
    padding: 14px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.5);
    background: transparent;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
  }

  label {
    position: absolute;
    left: 12px;
    top: 14px;
    font-size: 14px;
    color: #eee;
    pointer-events: none;
    transition: 0.3s;
  }

  input:focus + label,
  input:not(:placeholder-shown) + label {
    top: -10px;
    left: 8px;
    font-size: 12px;
    color: #fff;
    background: rgba(0,0,0,0.2);
    padding: 2px 6px;
    border-radius: 5px;
  }

  .show-pass {
    position: absolute;
    right: 12px;
    top: 14px;
    cursor: pointer;
    font-size: 18px;
    color: #fff;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #007bff, #00d4ff);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-top: 5px;
    transition: 0.25s;
    letter-spacing: 0.5px;
  }

  .login-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0, 217, 255, 0.4);
  }

  .error {
    color: #ffcccc;
    font-size: 14px;
    margin-top: 10px;
    display: none;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
  }

  /* Small Mobile */
  @media (max-width: 480px) {
    h2 {
      font-size: 20px;
    }
    .logo {
      width: 60px;
        height: 60px;
      font-size: 28px;
    }
      input {
      padding: 12px;
      font-size: 14px;
    }
  }
  /* Tablets */
  @media (max-width: 768px) {
  .login-container {
      width: 90%;
      padding: 30px 25px;
    }
  }

  /* Large Screens */
  @media (min-width: 1200px) {
    .login-container {
      width: 420px;
      padding: 50px 45px;
    }
  }  
</style>
</head>  

<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="login-container">

  <div class="logo">⚙️</div>

  <h2>Smart NetOps Hub</h2>

  <div class="input-group">
    <input type="text" id="username" placeholder=" " required>
    <label>Username</label>
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder=" " required>
    <label>Password</label>
    <span class="show-pass" onclick="togglePassword()">👁️</span>
  </div>

  <!-- Remember Me removed completely -->

  <button class="login-btn" onclick="login1()">Login</button>

  <div class="error" id="error-msg">Invalid username or password</div>

</div>

<script>
  // User records: username -> password (stored locally for demo)
  const userRecords = JSON.parse(localStorage.getItem("userRecords") || "{}");
  const ADMIN_PASSWORD = "Admin@123";

  // Toggle password visibility
  function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }

  // Username Validation
  function validateUsername(username) {
    const lengthValid = username.length >= 3 && username.length <= 20;
    return {
      valid: lengthValid,
      lengthValid
    };
  }

  // Password Validation
  function validatePassword(password) {
    const lengthValid = password.length >= 6 && password.length <= 20;
    return {
      valid: lengthValid,
      lengthValid
    };
  }

function login1(){
const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("error-msg");
    console.log(user, pass);
    if (user === "Admin" && pass === 'Admin@123') {
      console.log("ADMIN");
      localStorage.setItem("currentUser", user);
      localStorage.setItem("isAdmin", "true");
      if (window.ActivityTracker) {
        window.ActivityTracker.trackLogin(user, true);
      }
      document.querySelector(".login-btn").style.transform = "scale(0.95)";
      error.style.display = "none";
      setTimeout(() => window.location.href = "admin.html", 300);
    }else{
      console.log("USER");
      localStorage.setItem("currentUser", user);
    localStorage.setItem("isAdmin", "false");
    if (window.ActivityTracker) {
      window.ActivityTracker.trackLogin(user, false);
    }

    // Login success animation
    document.querySelector(".login-btn").style.transform = "scale(0.95)";
    error.style.display = "none";
      setTimeout(() => {
      window.location.href = "landing page.html";
    }, 400);
     }
}
  // Login function
  function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("error-msg");
    console.log(user, pass);
    // Admin flow
    if (user === "Admin" && pass === 'Admin@123') {
    console.log("ADMIN");
<!--      if (pass !== ADMIN_PASSWORD) {-->
<!--        error.style.display = "block";-->
<!--        error.textContent = "Invalid admin password";-->
<!--        return;-->
<!--      }-->

      // mark admin session
      localStorage.setItem("currentUser", user);
      localStorage.setItem("isAdmin", "true");
      if (window.ActivityTracker) {
        window.ActivityTracker.trackLogin(user, true);
      }
      document.querySelector(".login-btn").style.transform = "scale(0.95)";
      error.style.display = "none";
      setTimeout(() => window.location.href = "admin.html", 300);
      return;
    }else{
    // USERNAME CHECKS
    const userCheck = validateUsername(user);
    if (!userCheck.valid) {
      error.style.display = "block";
      error.textContent = "Username must be 3–20 characters";
      return;
    }

    // PASSWORD CHECKS
    const passCheck = validatePassword(pass);
    if (!passCheck.valid) {
      error.style.display = "block";
      error.textContent = "Password must be 6–20 characters";
      return;
    }

    // Existing user must match stored password; otherwise create new user record
    if (userRecords[user]) {
      if (userRecords[user] !== pass) {
        error.style.display = "block";
        error.textContent = "Incorrect password";
        return;
      }
    } else {
    console.log("USR");
      userRecords[user] = pass;
      localStorage.setItem("userRecords", JSON.stringify(userRecords));
    }

    localStorage.setItem("currentUser", user);
    localStorage.setItem("username", user);
    localStorage.setItem("isAdmin", "false");
    if (window.ActivityTracker) {
      window.ActivityTracker.trackLogin(user, false);
    }

    // Login success animation
    document.querySelector(".login-btn").style.transform = "scale(0.95)";
    error.style.display = "none";

    setTimeout(() => {
      window.location.href = "landing page.html";
    }, 400);
    }

  }

  // Enable ENTER key login
  document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      login();
    }
  });
</script>


</body>
</html>
