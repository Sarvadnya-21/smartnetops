<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vedas - An AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", system-ui, sans-serif;
      background: linear-gradient(135deg, #81868b, #7c7c86);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      display: flex;
    }

    /* Floating glowing background circles */
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: float 7s infinite ease-in-out;
      z-index: 0;
    }

    .c1 {
      width: 380px;
      height: 380px;
      background: #4a90e2;
      top: 8%;
      left: 12%;
    }

    .c2 {
      width: 450px;
      height: 450px;
      background: #9b59b6;
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-35px);
      }

      100% {
        transform: translateY(0);
      }
    }

    /* Layout */
    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      width: 100%;
      padding: 25px;
      gap: 30px;
    }

    /* Sidebar glass card */
    .sidebar {
      width: 260px;
      max-height: 92vh;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(14px);
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .dropdown {
      margin-bottom: 18px;
    }

    .dropdown-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
    }

    .dropdown-btn:hover {
      background: rgba(255, 255, 255, 0.33);
      transform: translateX(3px);
    }

    /* Dropdown search */
    .dropdown-search {
      width: 90%;
      padding: 8px;
      border-radius: 8px;
      margin: 8px 0;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .dropdown-content {
      display: none;
      margin-top: 10px;
      padding-left: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .dropdown-content div {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
    }

    .dropdown-content div:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* Chat Window */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(16px);
      border-radius: 14px;
      padding: 20px;
      height: 92vh;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .chat-header {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      margin-bottom: 12px;
      width: fit-content;
      max-width: 70%;
    }

    .user-msg {
      margin-left: auto;
      background: rgba(0, 149, 255, 0.42);
    }

    .chat-input-area {
      display: flex;
      gap: 12px;
    }

    .chat-input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .send-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      font-size: 16px;
      color: white;
    }

    .send-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading indicator */
    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .bot-msg {
      background: rgba(255, 255, 255, 0.22);
      white-space: pre-wrap;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.3);
      border-left: 3px solid #ff4d4d;
    }

    /* Model selector */
    .model-selector {
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .model-selector label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      opacity: 0.9;
    }

    .model-selector select {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 14px;
    }

    .model-selector select option {
      background: #2d2d2e;
      color: #fff;
    }

    /* Back button */
    .back-btn {
      margin-bottom: 20px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      color: white;
      display: inline-block;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <a href="landing page.html" class="back-btn">⬅ Back to Home</a>

      <!-- <div class="dropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('region')">🌐 Region</button>
      <div class="dropdown-content" id="region"></div>
    </div>

    <div class="dropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('country')">📡 Country</button>
      <div class="dropdown-content" id="country"></div>
    </div>

    <div class="dropdown">
      <button class="dropdown-btn" onclick="toggleDropdown('site')">🛠 Site Id</button>
      <div class="dropdown-content" id="site"></div>
    </div> -->

      <div class="box" class="mt-6 p-3 bg-gray-800 text-white rounded-lg text-sm">
        <p><strong>🌐 Region:</strong> <span id="regionDisplay"></span></p>
        <p><strong>📡 Country:</strong> <span id="countryDisplay"></span></p>
        <p><strong>🛠 Site ID:</strong> <span id="siteDisplay"></span></p>
      </div>

    </div>

    <!-- <p>Region: <span id="regionDisplay"></span></p>
  <p>Country: <span id="countryDisplay"></span></p>
  <p>Site: <span id="siteDisplay"></span></p> -->


    <!-- CHAT WINDOW -->
    <div class="chat-container">

      <div class="chat-header">💬 Vedas - An AI Assistant</div>

      <!-- <div class="model-selector">
      <label>🤖 Ollama Model:</label>
      <select id="modelSelect">
        <option value="llama2">llama2</option>
        <option value="mistral">mistral</option>
        <option value="codellama">codellama</option>
        <option value="phi">phi</option>
        <option value="neural-chat">neural-chat</option>
        <option value="starling-lm">starling-lm</option>
      </select>
    </div> -->

      <div class="chat-box" id="chatBox">
        <div class="msg bot-msg">
          👋 Hello! I'm your Vedas an AI Assistant. How can I help you with network operations today?
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..."
          onkeypress="handleKeyPress(event)" />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>

    </div>

  </div>

  <script>
    /* ===================== REGION → COUNTRY → SITE PERSISTENCE ===================== */

    /* Helper to read selections saved from landing page */
    function getSavedSelections() {
      return {
        region: localStorage.getItem("selectedRegion") || localStorage.getItem("region") || "Not selected",
        country: localStorage.getItem("selectedCountry") || localStorage.getItem("country") || "Not selected",
        site: localStorage.getItem("selectedSite") || localStorage.getItem("site") || "Not selected",
        siteInfo: localStorage.getItem("selectedSiteInfo") || null
      };
    }

    /* Update sidebar display based on saved selections */
    function updateSidebarDisplay() {
      const { region, country, site } = getSavedSelections();

      document.getElementById("regionDisplay").textContent = region;
      document.getElementById("countryDisplay").textContent = country;
      document.getElementById("siteDisplay").textContent = site;
    }

    /* Restore saved selections on page load */
    window.onload = () => {
      updateSidebarDisplay();
    };

    /* ===================== CHAT SYSTEM ===================== */

    let conversationHistory = [];

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const chatBox = document.getElementById("chatBox");
      const sendBtn = document.getElementById("sendBtn");
      // const modelSelect = document.getElementById("modelSelect");

      const userMessage = input.value.trim();
      if (!userMessage) return;

      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span>';

      /* Display User Message */
      const userMsg = document.createElement("div");
      userMsg.className = "msg user-msg";
      userMsg.textContent = userMessage;
      chatBox.appendChild(userMsg);
      chatBox.scrollTop = chatBox.scrollHeight;

      input.value = "";
      conversationHistory.push({ role: "user", content: userMessage });

      /* Bot loading indicator */
      const loadingMsg = document.createElement("div");
      loadingMsg.className = "msg bot-msg";
      loadingMsg.id = "loadingMsg";
      loadingMsg.innerHTML = '<span class="loading"></span> Thinking...';
      chatBox.appendChild(loadingMsg);
      chatBox.scrollTop = chatBox.scrollHeight;

      /* Build context */
      const context = conversationHistory
        .slice(-5)
        .map(m => `${m.role}: ${m.content}`)
        .join("\n");

      const selections = getSavedSelections();

      const payload = {
        // model: modelSelect.value,
        message: userMessage,
        context: context,
        region: selections.region,
        country: selections.country,
        site: selections.site,
        siteInfo: selections.siteInfo ? JSON.parse(selections.siteInfo) : null
      };

      try {
        const response = await fetch("http://localhost:8080/proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();  // 🔥 FIXED
        console.log(data);
        loadingMsg.remove();

        /* Display bot reply */
        const botMsg = document.createElement("div");
        botMsg.className = "msg bot-msg";
        botMsg.textContent = data || "⚠ No reply from server.";
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;

        conversationHistory.push({ role: "assistant", content: data.response });

      } catch (err) {
        loadingMsg.remove();

        const errorMsg = document.createElement("div");
        errorMsg.className = "msg error-msg";
        errorMsg.innerHTML = `❌ API Error: ${err}`;
        chatBox.appendChild(errorMsg);
      }

      input.disabled = false;
      sendBtn.disabled = false;
      sendBtn.textContent = "Send";
      input.focus();
    }

    /* ENTER key sends message */
    function handleKeyPress(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    }
  </script>
</body>

</html>
