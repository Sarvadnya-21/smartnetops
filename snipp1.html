<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NetAutomation Flow | Smart NetOps Hub</title>

    <style>
        /* ====== GLOBAL THEME (Matches Main Page) ====== */
        body {
            margin: 0;
            font-family: "Poppins", system-ui, sans-serif;
            background: linear-gradient(135deg, #81868b, #7c7c86);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Background glowing circles */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            animation: float 7s infinite ease-in-out;
            z-index: 0;
        }

        .c1 {
            width: 380px;
            height: 380px;
            background: #ff8c42;
            top: 8%;
            left: 12%;
        }

        .c2 {
            width: 450px;
            height: 450px;
            background: #ff4d4f;
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-35px);
            }

            100% {
                transform: translateY(0);
            }
        }

        /* ====== LAYOUT ====== */
        .layout {
            display: flex;
            gap: 25px;
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 30px;
            position: relative;
            z-index: 2;
        }

        /* ====== SIDEBAR (Same as Main Page) ====== */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 14px;
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
            max-height: 85vh;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        }

        .dropdown-content {
            display: none;
            background: rgba(255, 255, 255, 0.10);
            padding: 10px;
            border-radius: 10px;
        }

        .dropdown-content div {
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            margin: 5px 0;
            transition: 0.2s;
        }

        .dropdown-content div:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        /* ====== MAIN CONTENT ====== */
        .main-panel {
            flex: 1;
        }

        /* Title Section */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff8c42, #ff4d4f);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
        }

        /* Glass Cards */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 25px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            margin: 0;
        }

        /* Workflow item */
        .workflow-item {
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: 0.25s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            position: relative;
        }

        .workflow-item:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Query area (for workflows that use it) */
        .query-area {
            display: none;
            margin-top: 10px;
            position: relative;
        }

        .workflow-item:hover .query-area {
            display: block;
        }

        .query-area-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .query-controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .query-dropdown {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
            min-width: 150px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
        }

        .query-dropdown:hover {
            background-color: rgba(255, 255, 255, 0.35);
        }

        .query-area textarea {
            width: 100%;
            min-height: 5.2em;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            resize: vertical;
            box-sizing: border-box;
        }

        /* Response box */
        .response-box {
            display: none;
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.35);
            color: #e7e7e7;
        }

        .response-box.error {
            border-color: #ff6b6b;
            color: #ffb3b3;
        }

        /* Hosts table style (for workflows 1 & 2) */
        .hosts-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            color: #fff;
        }

        .hosts-table th,
        .hosts-table td {
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: left;
        }

        .hosts-table th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        .hosts-empty {
            opacity: 0.9;
            margin-top: 8px;
            font-size: 13px;
        }

        /* Buttons */
        .btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transition: 0.25s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            flex-direction: column;
            align-items: flex-end;
            min-width: 150px;
            gap: 4px;
            opacity: 0;
            visibility: hidden;
            transition: opacity .3s, visibility .3s;
        }

        .progress-container.active {
            display: flex;
            opacity: 1;
            visibility: visible;
        }

        .progress-percentage {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8c42, #ff4d4f);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* Hover form for 5th workflow (index 4) */
        .hover-form {
            position: absolute;
            top: 54px;
            left: 8px;
            width: 720px;
            max-width: calc(100% - 16px);
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 10px;
            opacity: 0;
            transform: translateY(-6px) scale(0.98);
            pointer-events: none;
            transition: opacity .18s ease, transform .18s ease;
            z-index: 50;
            color: #fff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        #workflowList .workflow-item:nth-of-type(5):hover .hover-form,
        #workflowList .workflow-item:nth-of-type(5):focus-within .hover-form {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .hover-form h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
        }

        .hover-form .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px 14px;
        }

        .hover-form label {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
            color: #fff;
        }

        .hover-form input[type="text"] {
            display: block;
            width: 100%;
            padding: 8px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            box-sizing: border-box;
        }

        .hover-form .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .hover-form button {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .hover-form button.cancel {
            background: #2c2c2c;
            color: #fff;
        }

        .hover-form button[type="submit"] {
            background: #0b79d0;
            color: #fff;
        }

        /* Responsive tweak */
        @media (max-width: 820px) {
            .hover-form {
                width: calc(100% - 16px);
                left: 8px;
                top: 70px;
            }

            .hover-form .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Back button */
        .back-btn {
            margin-bottom: 20px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            color: white;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- Background Glow -->
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>

    <!-- Layout -->
    <div class="layout">

        <!-- ========== SIDEBAR ========== -->
        <div class="sidebar">
            <a href="landing page.html" class="back-btn">⬅ Back to Home</a>

            <!-- REGION -->
            <div class="dropdown-content" id="regionBox"></div>

            <!-- COUNTRY -->
            <div class="dropdown-content" id="countryBox"></div>

            <!-- SITE -->
            <div class="dropdown-content" id="siteBox"></div>

            <div class="box">
                <p><strong>🌐 Region:</strong> <span id="regionDisplay"></span></p>
                <p><strong>📡 Country:</strong> <span id="countryDisplay"></span></p>
                <p><strong>🛠 Site ID:</strong> <span id="siteDisplay"></span></p>
            </div>

            <!-- DEV LIST DROPDOWN -->
            <div class="box" onclick="toggleDropdown('devListBox')">
                <strong>🖥 Available Devices</strong>
            </div>
            <div class="dropdown-content" id="devListBox"></div>

        </div>

        <!-- ========== MAIN PANEL ========== -->
        <div class="main-panel">

            <!-- Header -->
            <div class="header">
                <div class="header-icon">🔗</div>
                <div>
                    <h1>NetAutomation Flow</h1>
                    <p style="opacity:0.8;">Streamline network automation with visual workflow management</p>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="card">
                <h2>Automation Workflows</h2>
                <p style="opacity:0.8;">Manage and monitor your automated network workflows</p>
            </div>

            <!-- Workflow List -->
            <div id="workflowList">
                <!-- Loaded by JavaScript -->
            </div>

        </div>
    </div>

    <script>
        /* ======= Config & data (keep as-is) ======= */
        const regionData = {
            APAC: {
                "🇮🇳 India": ["Mumbai-01", "Delhi-02"],
                "🇯🇵 Japan": ["Tokyo-1"],
            },
            EMEA: { "🇬🇧 United Kingdom": ["London-45"] },
            AMER: { "🇺🇸 United States": ["US-WA-23"] }
        };
        let devListStore = []; // Global device store
        let selectedDevice = null;


        const workflow5FieldNames = [
            "Business Unit", "Site Priority", "Building, Floor", "Street Address", "City", "State", "Country", "Zipcode",
            "Primary Contact Name", "Secondary Contact Name", "Primary Contact", "Secondary Contact", "Primary Contact E-mail",
            "Secondary Contact E-mail", "Building Type"
        ];

        const RUN_API_URL = "http://161.145.120.131:8080/proxy2";
        const CNS_API_URL = "http://161.145.120.131:8080/proxy5";
        function getUsername() {
            return localStorage.getItem("username") || localStorage.getItem("currentUser") || localStorage.getItem("current_user") || "unknown";
        }

        /* ===== Sidebar helpers (unchanged) ===== */
        function toggleDropdown(id) { const box = document.getElementById(id); box.style.display = box.style.display === "block" ? "none" : "block"; }
        function loadRegions() { const regionBox = document.getElementById("regionBox"); regionBox.innerHTML = ''; Object.keys(regionData).forEach(region => { const d = document.createElement("div"); d.textContent = region; d.onclick = () => loadCountries(region); regionBox.appendChild(d); }); }
        function loadCountries(region) { const countryBox = document.getElementById("countryBox"); countryBox.innerHTML = ''; Object.keys(regionData[region]).forEach(country => { const d = document.createElement("div"); d.textContent = country; d.onclick = () => loadSites(region, country); countryBox.appendChild(d); }); document.getElementById("siteBox").innerHTML = ''; }
        function loadSites(region, country) {
            const siteBox = document.getElementById("siteBox"); siteBox.innerHTML = ''; regionData[region][country].forEach(site => {
                const d = document.createElement("div"); d.textContent = site;
                d.onclick = () => {
                    localStorage.setItem("selectedRegion", region);
                    localStorage.setItem("selectedCountry", country);
                    localStorage.setItem("selectedSite", site);

                    document.getElementById("regionDisplay").textContent = region;
                    document.getElementById("countryDisplay").textContent = country;
                    document.getElementById("siteDisplay").textContent = site;

                    loadDevListFromWorkflowAPI(); // 🔑 auto-load devices
                };

                siteBox.appendChild(d);
            });
        }

        loadRegions();

        //workflows

        const workflows = [
            { name: "Check Audit Compliance", status: "running", lastRun: "Never run" },
            { name: "Check CMDB Compliance", status: "scheduled", lastRun: "Never run" },
            { name: "Site Handover", status: "idle", lastRun: "Never run" },
            { name: "Health check of Device", status: "running", lastRun: "Never run" },
            { name: "Site Update", status: "running", lastRun: "Never run" },
            { name: "Check Network Status", status: "running", lastRun: "Never run" }
        ];

        function getLastRunText(idx) {
            const key = `lastRun_${idx}`;
            const lastRunTime = localStorage.getItem(key);

            if (!lastRunTime) return "Never used";

            const runTime = new Date(parseInt(lastRunTime, 10));
            const now = new Date();
            const diffMs = now - runTime;

            const diffSeconds = Math.floor(diffMs / 1000);
            const diffMins = Math.floor(diffSeconds / 60);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSeconds < 30) return "Just now";
            if (diffMins < 1) return `${diffSeconds} seconds ago`;
            if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? "s" : ""} ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? "s" : ""} ago`;
            return `${diffDays} day${diffDays > 1 ? "s" : ""} ago`;
        }

        function updateLastRun(idx) {
            const key = `lastRun_${idx}`;
            localStorage.setItem(key, Date.now());

            const span = document.querySelector(
                `.workflow-item[data-idx="${idx}"] span.last-run`
            );

            if (span) {
                span.textContent = getLastRunText(idx);
            }
        }

        function loadWorkflows() {
            const list = document.getElementById("workflowList");
            list.innerHTML = '';
            workflows.forEach((w, idx) => {
                let inputArea = '';
                if (idx === 4) {
                    let fields = '';
                    for (let i = 1; i <= 15; i++) {
                        const name = workflow5FieldNames[i - 1] || `Field ${i}`;
                        fields += `<div><label for="f${i}">${name}</label><input id="f${i}" name="f${i}" type="text" placeholder="Enter ${name}" /></div>`;
                    }
                    inputArea = `<div class="hover-form" id="hover-form-4">
      <h4>
        ${w.name} — Details
        <span style="opacity:0.75; font-weight:400;">
          <br>(${localStorage.getItem("selectedSite") || "No Site Selected"})
        </span>
      </h4>


      <form id="form-4" autocomplete="off" novalidate><div class="form-row">${fields}</div><div class="form-actions"><button type="button" class="cancel" onclick="document.getElementById('form-4').reset();">Clear</button></div></form></div>`;
                } else if (idx < 4) {
                    inputArea = '';
                } else if (idx === 5) {
                    inputArea = `<div class="query-area" id="query-${idx}"><div class="query-area-wrapper"><div class="query-controls-row"><select class="query-dropdown" id="dropdown-${idx}"><option value="option1">All Interfaces</option><option value="WAN">WAN Link</option><option value="option3">LAN Link</option></select></div></div></div>`;
                } else {
                    inputArea = `<div class="query-area" id="query-${idx}"><div class="query-area-wrapper"><div class="query-controls-row"><select class="query-dropdown" id="dropdown-${idx}"><option value="option1">All Interfaces</option><option value="WAN">WAN Link</option><option value="option3">LAN Link</option></select></div><textarea placeholder="Enter a quick query for ${w.name}..."></textarea></div></div>`;
                }

                list.innerHTML += `
      <div class="workflow-item" data-idx="${idx}">
        <div style="flex:1;">
          <strong>${w.name}</strong>
          <span class="last-run" style="opacity:0.7; display:block; margin-top:4px;">
            ${getLastRunText(idx)}
          </span>
          ${inputArea}
          <div class="response-box" id="response-${idx}"></div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <div class="progress-container" id="progress-${idx}"><div class="progress-percentage" id="progress-percent-${idx}">0%</div><div class="progress-bar-wrapper"><div class="progress-bar-fill" id="progress-bar-${idx}"></div></div></div>
          <button class="btn" id="run-${idx}" onclick="runWorkflow(${idx})">Run</button>
        </div>
      </div>`;
            });
        }

        function renderDevList() {
            const box = document.getElementById("devListBox");
            box.innerHTML = "";

            if (!devListStore.length) {
                box.innerHTML = `<div style="opacity:.7; text-align:center; padding:10px;">No device found</div>`;
                return;
            }

            devListStore.forEach(dev => {
                const d = document.createElement("div");
                d.textContent = `${dev.hostname} (${dev.ip})`;

                d.onclick = () => {
                    selectedDevice = dev;

                    // update sidebar label WITHOUT changing structure
                    const label = document.querySelector(".box[onclick*='devListBox'] strong");
                    if (label) label.textContent = `🖥 DevList: ${dev.hostname}`;

                    box.style.display = "none";
                };

                box.appendChild(d);
            });
        }

        /* ====== HELPERS ====== */
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
        function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }

        function safeField(obj, keys) {
            if (!obj || typeof obj !== 'object') return '';
            for (const k of keys) {
                if (k in obj && obj[k] !== null && obj[k] !== undefined && String(obj[k]).trim() !== '') return obj[k];
            }
            return '';
        }

        function updateProgress(i, p) {
            const bar = document.getElementById(`progress-bar-${i}`);
            const pct = document.getElementById(`progress-percent-${i}`);
            if (bar && pct) {
                bar.style.width = p + "%";
                pct.textContent = Math.round(p) + "%";
            }
        }

        async function loadDevListFromWorkflowAPI() {
            const siteId = localStorage.getItem("selectedSite");
            if (!siteId) return;

            try {
                const payload = {
                    workflow: "DEVICE_DISCOVERY",
                    query: "FETCH_DEVICES",
                    siteid: siteId
                };

                const res = await fetch(RUN_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error("DevList fetch failed");
                const rawText = await res.text();

                let parsed;
                try { parsed = JSON.parse(rawText); } catch { return; }

                const devList = parsed?.response?.devList;
                devListStore = []; // Clear existing store
                if (!devList) {
                    renderDevList();
                    return;
                }

                const devArray = Array.isArray(devList) ? devList : [devList];

                devListStore = devArray.map(item => ({
                    hostname: safeField(item, ['U_HOSTNAME', 'hostname', 'host', 'name']) || 'Unknown',
                    ip: safeField(item, ['U_LOGIN_IP', 'ip', 'address']) || '-'
                }));

                renderDevList();
            } catch (e) {
                console.error("DevList auto-load failed:", e);
            }
        }

        /* ====== CORE: runWorkflow with U_HOSTNAME / U_LOGIN_IP table rendering ====== */
        async function runWorkflow(idx) {
            const responseBox = document.getElementById(`response-${idx}`);
            const runBtn = document.getElementById(`run-${idx}`);

            if ((idx === 3 || idx === 5) && !selectedDevice) {
                responseBox.style.display = "block";
                responseBox.classList.add("error");
                responseBox.textContent = idx === 3
                    ? "Please select a device from DevList before running Health Check."
                    : "Please select a device from DevList before running Network Status Check.";
                return;
            }

            if (!responseBox || !runBtn) return;

            responseBox.classList.remove("error");
            responseBox.style.display = "block";
            responseBox.innerHTML = '';

            let query = '';
            if (idx < 4) {
                query = workflows[idx].name;
            } else if (idx === 4) {
                const form = document.getElementById('form-4');
                if (!form) return;
                let any = false; const parts = [];
                for (let i = 1; i <= 15; i++) { const el = form.querySelector(`#f${i}`); if (el && el.value.trim()) { parts.push(el.value.trim()); any = true; } }
                if (!any) { responseBox.textContent = "Please fill at least one field before running."; return; }
                query = parts.join(' | ');
            } else if (idx === 5) {
                query = workflows[idx].name;
            } else {
                const textarea = document.querySelector(`#query-${idx} textarea`);
                if (!textarea) return;
                if (!textarea.value.trim()) { responseBox.textContent = "Please enter a query before running."; return; }
                query = textarea.value.trim();
            }

            // progress UI
            const progressContainer = document.getElementById(`progress-${idx}`);
            const progressBar = document.getElementById(`progress-bar-${idx}`);
            const progressPercent = document.getElementById(`progress-percent-${idx}`);
            runBtn.disabled = true; const origText = runBtn.textContent; runBtn.textContent = "Running...";
            if (progressContainer && progressBar && progressPercent) { progressContainer.classList.add("active"); updateProgress(idx, 0); }
            responseBox.textContent = "Sending query...";

            let progress = 0;
            const progressInterval = setInterval(() => { progress += Math.random() * 15; if (progress > 90) progress = 90; updateProgress(idx, progress); }, 200);

            try {
                updateProgress(idx, 20);
                await delay(200);
                updateProgress(idx, 40);

                const payload = idx === 5 ? {
                    ip: selectedDevice.ip,
                    int_name: document.getElementById(`dropdown-${idx}`).value
                } : {
                    workflow: workflows[idx].name,
                    siteid: localStorage.getItem("selectedSite"),
                    query,
                    device: (idx === 3 || idx === 5) && selectedDevice
                        ? {
                            hostname: selectedDevice.hostname,
                            ip: selectedDevice.ip
                        }
                        : null
                };


                console.debug('sending', payload);

                const apiUrl = idx === 5 ? CNS_API_URL : RUN_API_URL;
                const res = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                updateProgress(idx, 70);
                responseBox.textContent = "Receiving response...";

                if (!res.ok) throw new Error(`Request failed (${res.status})`);

                try {
                    const usagePayload = buildUsagePayload({
                        username: getUsername(),
                        module: workflows[idx].name,
                        workflow: workflows[idx].name
                    });

                    fetch("http://161.145.120.131:8080/proxy3", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: usagePayload
                    });
                } catch (e) {
                    console.warn("Usage tracking failed:", e);
                }

                // Read raw text (handles cases where response isn't strict JSON)
                const rawText = await res.text();
                <!--    const responseLine = extractCleanResponseLine(rawText);-->

                // Try to parse to JSON; if fails, pass the rawText into parser
                let parsed;
                try { parsed = JSON.parse(rawText); } catch (e) { parsed = rawText; }

                // Normalize to array of objects (supports single object, array, newline-separated objects, comma-separated)
                console.log(parsed);

                const normalized = parsed;
                // If normalized contains objects with U_HOSTNAME / U_LOGIN_IP (case-insensitive), render table

                if (idx === 5) {
                    const interfaces =
                        normalized?.response?.interfaces ||
                        normalized?.interfaces ||
                        normalized?.response ||
                        normalized;

                    responseBox.innerHTML = buildInterfaceStatusTable(interfaces);
                }

                else {
                    responseBox.innerHTML = buildUHostTable(normalized.response);
                }
                updateLastRun(idx);

                // Capture devices ONLY for first two workflows
                if ((idx === 0 || idx === 1) && normalized.response?.devList) {
                    const devArray = Array.isArray(normalized.response.devList)
                        ? normalized.response.devList
                        : [normalized.response.devList];

                    devListStore = devArray.map(item => ({
                        hostname: safeField(item, ['U_HOSTNAME', 'hostname', 'host', 'name']) || 'Unknown',
                        ip: safeField(item, ['U_LOGIN_IP', 'ip', 'address']) || '-'
                    }));

                    renderDevList();
                }

                clearInterval(progressInterval);
                updateProgress(idx, 100);
                await delay(200);
            } catch (err) {
                clearInterval(progressInterval);
                updateProgress(idx, 100);
                console.error(err);
                responseBox.classList.add("error");
                responseBox.textContent = `Error: ${err.message || err}`;
            } finally {
                runBtn.disabled = false;
                runBtn.textContent = origText;
                setTimeout(() => { if (progressContainer) { progressContainer.classList.remove("active"); updateProgress(idx, 0); } }, 1000);
            }

            // Parse raw/varied backend payloads into array of objects
            function parseRawToArray(data) {
                if (!data && data !== 0) return [];
                if (Array.isArray(data)) return data.filter(x => x && typeof x === 'object');
                if (typeof data === 'object') return [data];
                if (typeof data === 'string') {
                    const trimmed = data.trim();
                    if (!trimmed) return [];
                    try {
                        const p = JSON.parse(trimmed);
                        if (Array.isArray(p)) return p.filter(x => x && typeof x === 'object');
                        if (p && typeof p === 'object') return [p];
                    } catch (e) { }
                    const lines = trimmed.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                    const out = [];
                    for (const ln of lines) {
                        try {
                            const p = JSON.parse(ln);
                            if (p && typeof p === 'object') out.push(p);
                            continue;
                        } catch (_) {
                            const pieces = ln.split(/\}\s*,\s*\{/);
                            if (pieces.length > 1) {
                                for (let i = 0; i < pieces.length; i++) {
                                    let piece = pieces[i];
                                    if (i === 0 && !piece.endsWith('}')) piece = piece + '}';
                                    else if (i === pieces.length - 1 && !piece.startsWith('{')) piece = '{' + piece;
                                    else piece = '{' + piece + '}';
                                    try { const p2 = JSON.parse(piece); if (p2 && typeof p2 === 'object') out.push(p2); } catch (e) { }
                                }
                                continue;
                            }
                        }
                    }
                    if (out.length) return out;
                    try {
                        const wrapped = '[' + trimmed.replace(/\}\s*,\s*\{/g, '},{') + ']';
                        const p2 = JSON.parse(wrapped);
                        if (Array.isArray(p2)) return p2.filter(x => x && typeof x === 'object');
                    } catch (_) { }
                    const objRegex = /\{[^{}]*\}/g;
                    const matches = trimmed.match(objRegex);
                    if (matches && matches.length) {
                        const out2 = [];
                        for (const m of matches) {
                            try { const p = JSON.parse(m); if (p && typeof p === 'object') out2.push(p); } catch (e) { }
                        }
                        if (out2.length) return out2;
                    }
                }
                return [];
            }

            function buildUHostTable(arr) {
                if (!arr || !arr.devList) return `<p>No device data received.</p>`;
                const devArray = Array.isArray(arr.devList) ? arr.devList : [arr.devList];
                if (!devArray.length) return `<p>No devices found.</p>`;
                const rows = devArray.map(item => {
                    const hostname = safeField(item, ['U_HOSTNAME', 'hostname', 'host', 'name']) || '-';
                    const ip = safeField(item, ['U_LOGIN_IP', 'ip', 'address']) || '-';
                    return `<tr><td>${escapeHtml(String(hostname))}</td><td>${escapeHtml(String(ip))}</td></tr>`;
                }).join('');
                return `<p>${escapeHtml(arr.opString || '')}</p><table class="hosts-table"><thead><tr><th>Device Name</th><th>Login IP</th></tr></thead><tbody>${rows}</tbody></table>`;
            }
        }

        function buildInterfaceStatusTable(interfaces) {
    if (!interfaces) return `<p>No interface data received.</p>`;

    const list = Array.isArray(interfaces) ? interfaces : [interfaces];
    if (!list.length) return `<p>No interfaces found.</p>`;

    const rows = list.map(intf => {
        const name = safeField(intf, ['interface', 'intf', 'name']) || '-';
        const ip = safeField(intf, ['ip_address', 'ip', 'address']) || '-';
        const proto = safeField(intf, ['proto', 'protocol']) || '-';
        const status = safeField(intf, ['status', 'state']) || '-';

        const statusColor = status.toLowerCase() === 'up' ? '#4cff4c' : '#ff6b6b';

        return `
            <tr>
                <td>${escapeHtml(name)}</td>
                <td>${escapeHtml(ip)}</td>
                <td>${escapeHtml(proto)}</td>
                <td style="color:${statusColor}; font-weight:600;">
                    ${escapeHtml(status)}
                </td>
            </tr>
        `;
    }).join('');

    return `
        <table class="hosts-table">
            <thead>
                <tr>
                    <th>Interface</th>
                    <th>IP Address</th>
                    <th>Protocol</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

        function buildUsagePayload({ username, module, workflow }) {
            const toolName = "Smart NetOps";

            // unique key per user + module + workflow
            const key = `usage_${username}_${module}_${workflow}`;

            // get previous count
            let count = parseInt(localStorage.getItem(key) || "0", 10);
            count += 1;

            // store updated count
            localStorage.setItem(key, count);

            return JSON.stringify({
                username: username,
                options_used: module,
                date: new Date().toISOString(),   // real-time access timestamp
                workflow: workflow,
                tool: toolName,
                result: count                     // number of times used
            });
        }


        /* ===== init ===== */
        loadWorkflows();
        window.onload = function () {
            const region = localStorage.getItem("selectedRegion");
            const country = localStorage.getItem("selectedCountry");
            const site = localStorage.getItem("selectedSite");
            if (document.getElementById("regionDisplay")) document.getElementById("regionDisplay").textContent = region || "-";
            if (document.getElementById("countryDisplay")) document.getElementById("countryDisplay").textContent = country || "-";
            if (document.getElementById("siteDisplay")) document.getElementById("siteDisplay").textContent = site || "-";

            // Auto-fetch devices if site is already selected
            if (site) loadDevListFromWorkflowAPI();
        };

        // ===== Auto-refresh "Last run" text every 30 seconds =====
        setInterval(() => {
            document.querySelectorAll(".workflow-item").forEach(item => {
                const idx = item.getAttribute("data-idx");
                const span = item.querySelector(".last-run");
                if (span) {
                    span.textContent = getLastRunText(idx);
                }
            });
        }, 30000);
    </script>
